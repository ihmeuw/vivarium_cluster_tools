# Minimal vivarium model specification for E2E testing of restart-after-failure.
#
# Identical to e2e_model_spec.yaml but adds FailOnceComponent, which will
# intentionally crash each task on its first execution when the
# FAIL_ONCE_SENTINEL_DIR environment variable is set.  On retry (restart with
# Jobmon resume) the sentinel files already exist, so the component is a no-op
# and every task succeeds.
components:
    vivarium.examples.disease_model:
        population:
            - BasePopulation()
        mortality:
            - Mortality()
        observer:
            - DeathsObserver()
    vivarium_cluster_tools.testing.fail_once_component:
        - FailOnceComponent()
configuration:
  time:
    start:
      year: 2025
      month: 1
      day: 1
    end:
      year: 2025
      month: 1
      day: 15
    step_size: 7  # days
  population:
    population_size: 10
  randomness:
    key_columns: []
  mortality:
    mortality_rate: 0.1
