# Minimal vivarium model specification for E2E testing.
# Runs 2 time steps with 10 simulants -- completes in seconds.
# No components, no data artifact, no results observers.
components:
    vivarium.examples.disease_model:
        population:
            - BasePopulation()
configuration:
  time:
    start:
      year: 2025
      month: 1
      day: 1
    end:
      year: 2025
      month: 1
      day: 15
    step_size: 7  # days
  population:
    population_size: 10
  randomness:
    key_columns: []
