# Minimal vivarium model specification for E2E testing.
# Runs 2 time steps with 10 simulants
# Includes mortality component and observer for output format verification.
# Mortality rate is set high (10% per time step) to ensure at least one death is likely.
components:
    vivarium.examples.disease_model:
        population:
            - BasePopulation()
        mortality:
            - Mortality()
        observer:
            - DeathsObserver()
configuration:
  time:
    start:
      year: 2025
      month: 1
      day: 1
    end:
      year: 2025
      month: 1
      day: 15
    step_size: 7  # days
  population:
    population_size: 10
  randomness:
    key_columns: []
  mortality:
    mortality_rate: 0.1
